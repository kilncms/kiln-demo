  </g>
  <path d="M9 14 q0-3 3-3 h16 q3 0 3 3 v18 q0 3-3 3 h-16 q-3 0-3-3 z" fill="none" stroke="#2f5d3a" stroke-width="2.4"/>
  <!-- mustard dot accent on label -->
  <circle cx="20" cy="24" r="3" fill="#fbf6ea" stroke="#2f5d3a" stroke-width="1.4"/>
  <circle cx="20" cy="24" r="1.1" fill="#e0a72e"/>
