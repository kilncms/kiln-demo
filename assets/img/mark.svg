<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Big Dill pickle jar mark">
  <defs>
    <clipPath id="m"><path d="M9 14 q0-3 3-3 h16 q3 0 3 3 v18 q0 3-3 3 h-16 q-3 0-3-3 z"/></clipPath>
  </defs>
  <!-- lid -->
  <rect x="11" y="6" width="18" height="5" rx="2" fill="#2f5d3a"/>
  <rect x="13" y="3" width="14" height="4" rx="2" fill="#21422a"/>
  <!-- jar fill -->
  <g clip-path="url(#m)">
    <rect x="9" y="11" width="22" height="24" fill="#8bb064"/>
    <ellipse cx="16" cy="22" rx="4" ry="9" transform="rotate(-14 16 22)" fill="#5f8a3c"/>
    <ellipse cx="24" cy="26" rx="4" ry="9" transform="rotate(12 24 26)" fill="#5f8a3c"/>
